<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hero explorations — Tracked Bookkeeping</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css" />
<link rel="stylesheet" href="direction-c.css" />
<style>
  body { background: #E8E2D2; margin: 0; }
  /* Direction B hero — preview-only, removes 100vh constraint */
  .ab-B { font-family: var(--sans); color: var(--on-dark); position: relative; width: 100%; height: 100%; overflow: hidden; background: var(--bg-deep); }
  .ab-B .hero { min-height: 100%; height: 100%; max-height: none; padding-bottom: 60px; }
  .ab-B .nav { padding: 22px 0; }
  .ab-B .hero-content { padding: 0 56px; }
  .ab-B .nav-inner { padding: 0 56px; }
  .ab-B video { width: 100%; height: 100%; }
  .ab-B .hero-h1 { font-size: 88px; line-height: 0.94; }
  .ab-B .hero-sub { font-size: 17px; }
  .ab-B .hero-scroll { display: none; }
  .ab-B .nav-links { display: flex; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
/* ────────── Direction B — Hero (Calm & Editorial) ────────── */
function HeroB() {
  return (
    <div className="ab-B">
      <div className="hero" style={{ paddingBottom: 60, minHeight: '100%' }}>
        <div className="hero-media">
          <video className="hero-video" autoPlay muted loop playsInline
            poster="https://images.unsplash.com/photo-1556761175-5973dc0f32e7?auto=format&fit=crop&w=1920&q=80">
            <source src="https://videos.pexels.com/video-files/3196284/3196284-uhd_2560_1440_25fps.mp4" type="video/mp4"/>
          </video>
          <div className="hero-tint"/>
        </div>
        <nav className="nav">
          <div className="nav-inner">
            <a href="#" className="brand">
              <span className="brand-mark">
                <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
                  <rect x="1" y="1" width="20" height="20" rx="5" stroke="currentColor" strokeWidth="1.6"/>
                  <path d="M5.5 13.5 L9 9.5 L12 12 L16.5 6.5" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                  <circle cx="16.5" cy="6.5" r="1.4" fill="currentColor"/>
                </svg>
              </span>
              <span className="brand-name">Tracked<span className="brand-name-light"> Bookkeeping</span></span>
            </a>
            <ul className="nav-links">
              <li><a href="#">Services</a></li>
              <li><a href="#">How it works</a></li>
              <li><a href="#">About Rose</a></li>
              <li><a href="#">FAQ</a></li>
            </ul>
            <a className="btn btn-pill btn-nav">Request a quote →</a>
          </div>
        </nav>
        <div className="hero-content" style={{ position: 'relative' }}>
          <div className="hero-eyebrow">
            <span className="loc-dot"/> Northeast Florida · Jacksonville &amp; St. Augustine
          </div>
          <h1 className="hero-h1" style={{ fontFamily: '"Instrument Serif", serif' }}>
            Clean books.<br/>
            <em>Clear numbers.</em><br/>
            Calm Mondays.
          </h1>
          <p className="hero-sub">
            Bookkeeping built for small and local businesses across Northeast Florida.
            A QuickBooks Online ProAdvisor on your team — without the price tag of a firm.
          </p>
          <div className="hero-ctas">
            <a className="btn btn-primary">Request a quote</a>
            <a className="btn btn-ghost">Book a 30-min call</a>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ────────── Direction C — Hero (Data-forward) ────────── */
function HeroC() {
  return (
    <div className="dirC">
      <div className="dirC-grid-bg"/>
      <div className="dirC-nav">
        <div className="dirC-brand">
          <span className="mark">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2 9 L5 6 L7 7.5 L11 3.5" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
              <circle cx="11" cy="3.5" r="1.1" fill="currentColor"/>
            </svg>
          </span>
          <span><b>Tracked</b><span className="light"> / bookkeeping</span></span>
        </div>
        <div className="dirC-nav-links">
          <span>Services</span>
          <span>Process</span>
          <span>About</span>
          <span>FAQ</span>
        </div>
        <a className="dirC-nav-cta">
          Request a quote
          <svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M3 7h8m-3-3 3 3-3 3" stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round"/></svg>
        </a>
      </div>

      <div className="dirC-hero">
        <div>
          <div className="dirC-loc">
            <span className="dirC-loc-dot"/> NE Florida · Jax / St. Augustine / Beaches
          </div>
          <h1 className="dirC-h1">
            Books closed.<br/>
            Reports ready.<br/>
            <span className="underscore">By the 10th.</span>
          </h1>
          <p className="dirC-sub">
            Modern bookkeeping for small and local businesses in Northeast Florida — built
            around real-time data, flat monthly pricing, and a QBO ProAdvisor you can
            actually reach.
          </p>
          <div className="dirC-ctas">
            <a className="dirC-btn primary">
              Request a quote
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7h8m-3-3 3 3-3 3" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>
            </a>
            <a className="dirC-btn ghost">Book a 30-min call</a>
          </div>
          <div className="dirC-stats">
            <div>
              <div className="dirC-stat-n">10<span className="unit">th</span></div>
              <div className="dirC-stat-l">books closed by</div>
            </div>
            <div>
              <div className="dirC-stat-n">24<span className="unit">h</span></div>
              <div className="dirC-stat-l">reply time</div>
            </div>
            <div>
              <div className="dirC-stat-n">QBO</div>
              <div className="dirC-stat-l">ProAdvisor certified</div>
            </div>
          </div>
        </div>

        <div className="dirC-dash">
          <div className="dirC-dash-top">
            <div className="dirC-dash-title">May 2026 P&amp;L <span>· closed</span></div>
            <div className="dirC-dash-status">Up to date</div>
          </div>

          <div className="dirC-dash-kpis">
            <div className="dirC-kpi">
              <div className="dirC-kpi-l">Revenue</div>
              <div className="dirC-kpi-v">$48.2k <span className="dirC-kpi-d up">↑ 12%</span></div>
            </div>
            <div className="dirC-kpi">
              <div className="dirC-kpi-l">Expenses</div>
              <div className="dirC-kpi-v">$31.7k <span className="dirC-kpi-d down">↑ 4%</span></div>
            </div>
            <div className="dirC-kpi">
              <div className="dirC-kpi-l">Net</div>
              <div className="dirC-kpi-v">$16.5k <span className="dirC-kpi-d up">↑ 28%</span></div>
            </div>
          </div>

          <div className="dirC-dash-chart">
            <div className="dirC-dash-chart-l">
              <span>Cash · last 6 mo</span>
              <span>+ $14.2k</span>
            </div>
            <svg width="100%" height="60" viewBox="0 0 420 60" preserveAspectRatio="none">
              <defs>
                <linearGradient id="cg" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stopColor="#2F5D4D" stopOpacity="0.25"/>
                  <stop offset="100%" stopColor="#2F5D4D" stopOpacity="0"/>
                </linearGradient>
              </defs>
              <path d="M0 42 L60 38 L120 44 L180 30 L240 32 L300 22 L360 18 L420 10 L420 60 L0 60 Z" fill="url(#cg)"/>
              <path d="M0 42 L60 38 L120 44 L180 30 L240 32 L300 22 L360 18 L420 10"
                fill="none" stroke="#2F5D4D" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
          </div>

          <div className="dirC-rows">
            <div className="dirC-row">
              <div>
                <div className="cat">Income · Sales</div>
                <div className="label">Client retainers</div>
              </div>
              <div className="amt pos">+ $28,400</div>
              <div className="amt">58.9%</div>
            </div>
            <div className="dirC-row">
              <div>
                <div className="cat">Expense · COGS</div>
                <div className="label">Materials &amp; supplies</div>
              </div>
              <div className="amt neg">– $11,820</div>
              <div className="amt">37.3%</div>
            </div>
            <div className="dirC-row">
              <div>
                <div className="cat">Expense · Payroll</div>
                <div className="label">Team &amp; contractors</div>
              </div>
              <div className="amt neg">– $14,500</div>
              <div className="amt">45.7%</div>
            </div>
          </div>

          <div className="dirC-dash-foot">
            <span>Generated 06.01.2026</span>
            <span><strong>Tracked Bookkeeping</strong> · for Riverside HVAC</span>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ────────── Notes artboard ────────── */
function Notes() {
  return (
    <div style={{
      padding: '60px 50px',
      fontFamily: '"Manrope", sans-serif',
      color: '#15201C',
      background: '#FBF7EC',
      width: '100%', height: '100%',
      overflow: 'auto'
    }}>
      <div style={{
        fontFamily: '"JetBrains Mono", monospace',
        fontSize: 11, letterSpacing: '0.16em',
        textTransform: 'uppercase', color: '#6A726E', marginBottom: 18
      }}>side-by-side notes</div>
      <h1 style={{
        fontFamily: '"Instrument Serif", serif',
        fontWeight: 400, fontSize: 56, lineHeight: 0.98,
        letterSpacing: '-0.02em', margin: '0 0 28px', maxWidth: '14ch'
      }}>
        B vs C — <em style={{ fontStyle: 'italic' }}>which feels more like Tracked?</em>
      </h1>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 36, marginTop: 24 }}>
        <div>
          <div style={{ fontFamily: '"Manrope", sans-serif', fontWeight: 600, fontSize: 18, marginBottom: 8 }}>Direction B · Calm &amp; Editorial</div>
          <p style={{ margin: '0 0 12px', color: '#3D4843', fontSize: 15.5, lineHeight: 1.55 }}>
            Background video + serif headline = warm, human, "small firm I trust." Reads like
            Hiline's calm authority filtered through a Yellow-Jacket-style ambient hero.
          </p>
          <ul style={{ paddingLeft: 18, color: '#3D4843', fontSize: 14.5, lineHeight: 1.7, margin: 0 }}>
            <li>Feels personal — leads with vibe over specifics</li>
            <li>Video sets emotion before copy lands</li>
            <li>Lower information density on first paint</li>
            <li>Strong for SMB founders who hire on trust</li>
          </ul>
        </div>
        <div>
          <div style={{ fontFamily: '"Manrope", sans-serif', fontWeight: 600, fontSize: 18, marginBottom: 8 }}>Direction C · Data-forward</div>
          <p style={{ margin: '0 0 12px', color: '#3D4843', fontSize: 15.5, lineHeight: 1.55 }}>
            Sans headline + a live-looking P&amp;L hero = confident, product-y, "they know
            what good books look like." Leans into the "Tracked" name.
          </p>
          <ul style={{ paddingLeft: 18, color: '#3D4843', fontSize: 14.5, lineHeight: 1.7, margin: 0 }}>
            <li>Communicates the deliverable in the hero</li>
            <li>Numbers + monospace = competence cues</li>
            <li>Faster to scan, higher info density</li>
            <li>Strong for founders who shop on capability</li>
          </ul>
        </div>
      </div>

      <div style={{
        marginTop: 36, padding: '20px 22px',
        background: '#F2EDE2', border: '1px solid #DCD3BF', borderRadius: 14
      }}>
        <div style={{
          fontFamily: '"JetBrains Mono", monospace', fontSize: 11,
          letterSpacing: '0.14em', textTransform: 'uppercase', color: '#1C3E33', marginBottom: 6
        }}>recommendation</div>
        <div style={{ fontFamily: '"Instrument Serif", serif', fontSize: 22, lineHeight: 1.3, color: '#15201C' }}>
          Lead with <em>B</em> on the homepage for first impression — and use <em>C</em>'s P&amp;L
          card as a recurring visual motif inside Services and Process sections.
        </div>
      </div>
    </div>
  );
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="heroes" title="Homepage Hero" subtitle="Direction B vs C · 1280×800">
        <DCArtboard id="b" label="Direction B — Calm & Editorial" width={1280} height={800}>
          <HeroB/>
        </DCArtboard>
        <DCArtboard id="c" label="Direction C — Data-forward" width={1280} height={800}>
          <HeroC/>
        </DCArtboard>
        <DCArtboard id="notes" label="Notes & recommendation" width={780} height={800}>
          <Notes/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
